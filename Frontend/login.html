<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamChase — Login</title>
  <meta name="description" content="Sign in to DreamChase AI and continue your personalized career roadmap journey." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="js/app.js" defer></script>
  
  <script src="js/login.js" defer></script>
</body>
</html>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span>DreamChase</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="chat.html" class="nav-link">Chat</a>
        <a href="login.html" class="nav-link nav-link--active">Login</a>
        <a href="index.html" class="nav-cta">Get Started</a>
      </div>
    </div>
  </nav>

  <main class="login-wrap">

    <div class="blob blob-1" aria-hidden="true"></div>
    <div class="blob blob-2" aria-hidden="true"></div>
    <div class="blob blob-3" aria-hidden="true"></div>

    <section class="login-card" aria-label="Sign in form">

      <div class="login-header">
        <div class="login-icon" aria-hidden="true">
          <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="23" stroke="url(#loginGrad)" stroke-width="1.5"/>
            <path d="M24 14a5 5 0 1 1 0 10 5 5 0 0 1 0-10zM16 33c0-4.418 3.582-7 8-7s8 2.582 8 7" stroke="url(#loginGrad2)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="loginGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6C63FF" stop-opacity=".6"/>
                <stop offset="1" stop-color="#3ECFCF" stop-opacity=".6"/>
              </linearGradient>
              <linearGradient id="loginGrad2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6C63FF"/>
                <stop offset="1" stop-color="#3ECFCF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="login-title">Welcome <span class="gradient-text">back</span></h1>
        <p class="login-sub">Sign in to continue your career journey</p>
      </div>

      <form id="loginForm" class="login-form" novalidate>

        <div class="login-field" id="emailField">
          <div class="login-field__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="1.8"/>
              <path d="M2 7l10 6 10-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <input
            type="email"
            id="loginEmail"
            class="login-field__input"
            placeholder="Email address"
            autocomplete="email"
            spellcheck="false"
            required
            aria-label="Email address"
          />
        </div>

        <div class="login-field" id="passwordField">
          <div class="login-field__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="3" stroke="currentColor" stroke-width="1.8"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <input
            type="password"
            id="loginPassword"
            class="login-field__input"
            placeholder="Password"
            autocomplete="current-password"
            required
            aria-label="Password"
          />
          <button type="button" class="login-field__toggle" id="togglePassword" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="eye-open">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="eye-closed" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="login-options">
          <label class="login-remember" for="rememberMe">
            <input type="checkbox" id="rememberMe" />
            <span class="login-remember__check"></span>
            <span>Remember me</span>
          </label>
          <a href="#" class="login-forgot">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>

      </form>

      <div class="login-divider">
        <span>or continue with</span>
      </div>

      <div class="login-social-row">
        <button type="button" class="login-social-btn" id="googleLoginBtn" aria-label="Sign in with Google">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.44 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Google</span>
        </button>
        <button type="button" class="login-social-btn" id="githubLoginBtn" aria-label="Sign in with GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          <span>GitHub</span>
        </button>
      </div>

      <p class="login-footer-text">
        Don't have an account? <a href="#" class="login-signup-link">Sign up</a>
      </p>

    </section>

  </main>

  <footer class="site-footer">
    <p>© 2026 DreamChase AI</p>
  </footer>

  <script src="js/login.js" defer></script>

</body>
</html>
